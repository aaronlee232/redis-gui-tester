server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy all API requests to the Go backend in the same pod.
    # Both containers share localhost inside the Kubernetes pod.
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve the SPA: try the exact file, then fall back to index.html
    # so client-side routing works for any URL.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively; Vite adds content hashes to filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
